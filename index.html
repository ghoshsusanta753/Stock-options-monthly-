
<!DOCTYPE html>
<html>
<head>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Option Calculator V9</title>
<style>
body{font-family:Segoe UI;background:#0f172a;color:white;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:18px;margin:15px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
input{width:100%;padding:12px;border:none;border-radius:10px;background:#334155;color:white}
button{background:#22c55e;color:white;border:none;padding:14px 30px;border-radius:10px;font-size:18px}
table{width:100%;border-collapse:collapse}
th{background:#2563eb;padding:12px}
td{padding:12px;text-align:center}
tr:nth-child(even){background:#334155}
.title{text-align:center;font-size:34px;padding:20px;color:#60a5fa;font-weight:bold}
.badge{text-align:center;font-size:24px;font-weight:bold;padding:10px}
</style>
</head>
<body>
<div class='container'>
<div class='title'>OPTION CALCULATOR V9</div>

<div class='card'>
<div class='grid'>
<div><label>Spot Price</label><input id='s' value='779.8'></div>
<div><label>ATM IV %</label><input id='iv' value='19.76'></div>
<div><label>India VIX</label><input id='v' value='12.97'></div>
<div><label>ATR(20)</label><input id='a' value='17.58'></div>
<div><label>Days</label><input id='d' value='10'></div>
<div><label>PCR</label><input id='p' value='1'></div>
<div><label>RSI</label><input id='r' value='50'></div>
</div>
<br><center><button onclick='calc()'>CALCULATE</button></center>
</div>

<div class='card'><div id='move' class='badge'>Move ₹0</div></div>
<div class='card'><div id='risk' class='badge'>Risk --</div><div id='dir' class='badge'>Direction --</div></div>

<div class='card'>
<table>
<thead><tr><th>POP</th><th>Lower</th><th>Upper</th><th>PE</th><th>CE</th></tr></thead>
<tbody id='t'></tbody>
</table>
</div>

<script>
function calc(){
let s=+document.getElementById('s').value||0;
let iv=+document.getElementById('iv').value||0;
let v=+document.getElementById('v').value||0;
let a=+document.getElementById('a').value||0;
let d=+document.getElementById('d').value||0;
let p=+document.getElementById('p').value||0;
let r=+document.getElementById('r').value||0;

let m=0.4*(s*iv/100*Math.sqrt(d/365))+0.3*(s*(v/19)*Math.sqrt(d/365))+0.3*(a*Math.sqrt(d));
document.getElementById('move').innerHTML='Combined Move ₹'+m.toFixed(2);

document.getElementById('risk').innerHTML=(v<14)?'🟢 LOW RISK':(v<18)?'🟡 MEDIUM RISK':'🔴 HIGH RISK';

document.getElementById('dir').innerHTML=(p>1.1 && r>55)?'🟢 BULLISH':(p<0.9 && r<45)?'🔴 BEARISH':'🟡 NEUTRAL';

let arr=[[75,1.1],[85,1.3],[90,1.5],[95,2]];
let h='';
for(let i=0;i<arr.length;i++){
let l=(s-arr[i][1]*m).toFixed(2);
let u=(s+arr[i][1]*m).toFixed(2);
h+=`<tr><td>${arr[i][0]}%</td><td>${l}</td><td>${u}</td><td>${Math.floor(l/10)*10}</td><td>${Math.ceil(u/10)*10}</td></tr>`;
}
document.getElementById('t').innerHTML=h;
}
</script>
</div>
</body>
</html>
